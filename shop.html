<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Farm Shop | Tapestry Acres</title>
  <meta name="description" content="Shop the full Tapestry Acres farm store — alpaca socks, hand-dyed yarn, roving, gloves, and more.">
  <link rel="canonical" href="https://trashpanda62.github.io/tapestry-game/shop.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Farm Shop | Tapestry Acres">
  <meta property="og:description" content="Shop the full Tapestry Acres farm store — alpaca socks, hand-dyed yarn, roving, gloves, and more.">
  <meta property="og:url" content="https://trashpanda62.github.io/tapestry-game/shop.html">
  <meta property="og:image" content="https://items-images-production.s3.us-west-2.amazonaws.com/files/a642fa779bf9ce22c4775aa32dff49046b88d88f/original.jpeg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Farm Shop | Tapestry Acres">
  <meta name="twitter:description" content="Shop the full Tapestry Acres farm store — alpaca socks, hand-dyed yarn, roving, gloves, and more.">
  <meta name="twitter:image" content="https://items-images-production.s3.us-west-2.amazonaws.com/files/a642fa779bf9ce22c4775aa32dff49046b88d88f/original.jpeg">
  <link rel="stylesheet" href="assets/site.css">
  <style>
    .shop-page{padding:58px 0 90px}.shop-intro{text-align:center}.shop-intro h1{margin:0 auto 14px; color:var(--ink); text-shadow:none}.shop-intro p{margin:0 auto; color:var(--muted)}
    .shop-controls{margin:36px 0 30px}.shop-search{max-width:520px; margin:0 auto 20px}.shop-search label{display:block; margin-bottom:6px}
    .shop-toolbar{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:16px 24px}
    .filter-tabs{display:flex; justify-content:center; flex-wrap:wrap; gap:9px}.filter-tab{padding:9px 15px; border:1px solid var(--cardborder); border-radius:999px; background:var(--card); color:var(--forest); font:700 14px var(--sans); cursor:pointer}.filter-tab[aria-selected="true"]{border-color:var(--forest); background:var(--forest); color:#fff}
    .shop-sort{display:flex; align-items:center; gap:9px}.shop-sort label{color:var(--muted); font:700 13px var(--sans); white-space:nowrap}.shop-sort select{padding:9px 32px 9px 15px; border:1px solid var(--cardborder); border-radius:999px; background:var(--card); color:var(--forest); font:700 14px var(--sans); cursor:pointer}
    @media(max-width:700px){.shop-toolbar{flex-direction:column}}
    .product-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:22px}.product-card{display:flex; flex-direction:column; overflow:hidden; border:1px solid var(--cardborder); border-radius:18px; background:var(--card); box-shadow:var(--shadow)}.product-card img{display:block; width:100%; aspect-ratio:4/3; object-fit:cover; background:#eee7d7}.product-body{display:flex; flex:1; flex-direction:column; align-items:flex-start; padding:22px}.product-card h2{margin:0 0 9px; color:var(--forest); font-size:22px}.product-price{margin:0 0 10px; color:var(--accent); font:700 22px var(--serif)}.product-description{margin:0 0 17px; color:var(--muted)}.stock-badge{margin:0 0 15px; padding:5px 10px; border-radius:999px; background:#f3dfad; color:#61480b; font-size:13px; font-weight:700}.stock-badge.sold-out{background:#e4dfd3; color:#4e493e}.product-card .btn{margin-top:auto}.product-card .btn[disabled]{background:#8b877d; cursor:not-allowed; filter:none; transform:none}.shop-message{padding:28px; border:1px solid var(--cardborder); border-radius:16px; background:var(--card); text-align:center}.shop-message[hidden]{display:none}
    .shop-load-more{display:flex; justify-content:center; margin-top:34px}.shop-load-more .btn[hidden]{display:none}
    @media(max-width:700px){.shop-page{padding-top:35px}.shop-intro h1{font-size:clamp(2.6rem,14vw,4rem)}.product-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">TAPESTRY ACRES</div>
      <button class="site-nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav"><span class="sr-only">Toggle navigation</span><span aria-hidden="true"></span></button>
      <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="experiences.html">Experiences</a>
        <a href="shop.html" aria-current="page">Shop</a>
        <a href="animals.html">Animals</a>
        <a href="meet-the-herd.html">Meet the Herd</a>
        <a href="rv-rentals.html">RV Rentals</a>
      </nav>
    </div>
  </header>
  <main class="page shop-page">
    <section class="shop-intro" aria-labelledby="shop-title">
      <h1 id="shop-title">The Farm Shop</h1>
      <p>Soft alpaca fiber and useful goods, made and selected with care at Tapestry Acres.</p>
    </section>
    <section aria-label="Products">
      <div class="shop-controls">
        <div class="shop-search"><label for="product-search">Search the shop</label><input id="product-search" type="search" aria-label="Search products" placeholder="Search products" autocomplete="off"></div>
        <div class="shop-toolbar">
          <div class="filter-tabs" id="filter-tabs" role="tablist" aria-label="Filter products by category"></div>
          <div class="shop-sort"><label for="product-sort">Sort</label><select id="product-sort" aria-label="Sort products">
            <option value="featured">Featured</option>
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
            <option value="name-asc">Name: A–Z</option>
          </select></div>
        </div>
      </div>
      <p class="shop-message sr-only" id="shop-status" role="status">Loading products…</p>
      <div class="product-grid" id="product-grid" aria-busy="true"><article class="skeleton-card" aria-hidden="true"></article><article class="skeleton-card" aria-hidden="true"></article><article class="skeleton-card" aria-hidden="true"></article></div>
      <div class="shop-load-more"><button type="button" class="btn" id="load-more" hidden>Load more</button></div>
    </section>
  </main>
  <footer><div class="footer-logo">TAPESTRY ACRES</div><div class="footer-flourish" aria-hidden="true">❖ ✳ ❖</div><a class="footer-link" href="mailto:tapestryacres@gmail.com">tapestryacres@gmail.com</a></footer>
  <script defer>
    (function(){
      var toggle=document.querySelector('.site-nav-toggle');
      var tabs=document.getElementById('filter-tabs');
      var search=document.getElementById('product-search');
      var sortSelect=document.getElementById('product-sort');
      var grid=document.getElementById('product-grid');
      var status=document.getElementById('shop-status');
      var loadMoreBtn=document.getElementById('load-more');
      var products=[];
      var titleCounts={};
      var activeFilter='All';
      var activeSort='featured';
      var SORTERS={
        'featured':null,
        'price-asc':function(a,b){return Number(a.price)-Number(b.price);},
        'price-desc':function(a,b){return Number(b.price)-Number(a.price);},
        'name-asc':function(a,b){return a.title.localeCompare(b.title);}
      };
      var CHUNK_SIZE=24;
      var renderedCount=CHUNK_SIZE;

      toggle.addEventListener('click',function(){toggle.setAttribute('aria-expanded',toggle.getAttribute('aria-expanded')!=='true');});

      var GROUPS=['All','Socks','Yarn & Fiber','Apparel & Accessories','Bath & Body','Stuffies & Kids','Blankets & Home','Gift Certificates','Seasonal'];
      var COLLECTION_TO_GROUP={
        'Socks':'Socks','My Comfy Socks':'Socks','Outdoors Socks':'Socks','Paca Socks':'Socks','Dress Socks':'Socks','Slipper Socks':'Socks','Sport Socks':'Socks',
        'Cascade Yarns':'Yarn & Fiber','Roving':'Yarn & Fiber','Alpaca Lace Yarns':'Yarn & Fiber','Pure Alpaca Yarns':'Yarn & Fiber','Salar Yarns':'Yarn & Fiber','Luna':'Yarn & Fiber','Luna Paints':'Yarn & Fiber','Rabat':'Yarn & Fiber','Baby Chunky Alpaca':'Yarn & Fiber','Yarn':'Yarn & Fiber','Bulky':'Yarn & Fiber','Hand Dyed Yarns':'Yarn & Fiber',
        'Accessories':'Apparel & Accessories','Bags':'Apparel & Accessories','Fingerless Mittens and Gloves':'Apparel & Accessories','Gloves':'Apparel & Accessories','Hats':'Apparel & Accessories','Mittens':'Apparel & Accessories','Scarves':'Apparel & Accessories','Sweaters':'Apparel & Accessories','Simply Natural':'Apparel & Accessories','our faves':'Apparel & Accessories','New England Alpaca Fiber Pool':'Apparel & Accessories',
        'All Natural Soaps':'Bath & Body','Bath Bombs & Salts':'Bath & Body','Scrubs':'Bath & Body','Soaps, Scrubs & Bath':'Bath & Body','Washcloth Soap':'Bath & Body','Wax Tart Melts':'Bath & Body',
        'Kids Things':'Stuffies & Kids','Stuffies':'Stuffies & Kids',
        'Blankets':'Blankets & Home','Household':'Blankets & Home',
        'Gift Certificates':'Gift Certificates',
        'Christmas':'Seasonal','Seasonal Specials':'Seasonal'
      };
      function groupFor(product){return COLLECTION_TO_GROUP[product.category]||'Apparel & Accessories';}
      function shortDescription(description){
        if(description.length<=180)return description;
        var shortened=description.slice(0,177);
        var lastSpace=shortened.lastIndexOf(' ');
        return shortened.slice(0,lastSpace>120?lastSpace:177)+'…';
      }
      function addText(parent,tag,className,value){var element=document.createElement(tag);if(className)element.className=className;element.textContent=value;parent.appendChild(element);return element;}
      function addStructuredData(items){
        var seenGroups={};var seenTitles={};var featured=[];
        items.forEach(function(product){
          if(featured.length>=8||seenTitles[product.title]||!product.checkout_url)return;
          var group=groupFor(product);
          if(seenGroups[group])return;
          seenGroups[group]=true;seenTitles[product.title]=true;featured.push(product);
        });
        var base='https://trashpanda62.github.io/tapestry-game/';
        var data={"@context":"https://schema.org","@type":"ItemList","itemListElement":featured.map(function(product,index){
          var image=firstImage(product);
          return {"@type":"ListItem","position":index+1,"item":{"@type":"Product","sku":product.sku,"name":product.title,
            "description":shortDescription(product.description||''),
            "image":image?(image.indexOf('http')===0?image:base+image):undefined,
            "offers":{"@type":"Offer","price":Number(product.price).toFixed(2),"priceCurrency":"USD",
              "availability":(Number(product.qty)>0||isUntrackedInventory(product))?"https://schema.org/InStock":"https://schema.org/LimitedAvailability",
              "url":product.checkout_url}}};
        })};
        var script=document.createElement('script');script.type='application/ld+json';script.textContent=JSON.stringify(data);document.head.appendChild(script);
      }
      function firstImage(product){
        if(product.images_local&&product.images_local[0])return product.images_local[0];
        if(product.images&&product.images[0])return product.images[0];
        return null;
      }
      function isUntrackedInventory(product){
        // Wix's API has no per-variant stock endpoint, so multi-variant items
        // (many feed rows sharing one title) are imported with qty=0 for every
        // variation regardless of real availability -- that 0 means "untracked",
        // not "sold out". Single-row products still have real tracked qty.
        return (titleCounts[product.title]||0)>1;
      }
      function render(){
        grid.setAttribute('aria-busy','false');
        var query=search.value.trim().toLowerCase();
        var matches=products.filter(function(product){
          var matchesCategory=activeFilter==='All'||groupFor(product)===activeFilter;
          var searchable=(product.title+' '+product.description).toLowerCase();
          return matchesCategory&&searchable.indexOf(query)!==-1;
        });
        var sorter=SORTERS[activeSort];
        if(sorter)matches=matches.slice().sort(sorter);
        var visible=matches.slice(0,renderedCount);
        grid.replaceChildren();
        visible.forEach(function(product){
          var card=document.createElement('article');card.className='product-card';
          var src=firstImage(product);
          if(src){var image=document.createElement('img');image.src=src;image.alt=product.title;image.loading='lazy';image.width=400;image.height=300;card.appendChild(image);}
          var body=document.createElement('div');body.className='product-body';card.appendChild(body);
          addText(body,'h2','',product.title);
          addText(body,'p','product-price','$'+Number(product.price).toFixed(2));
          addText(body,'p','product-description',shortDescription(product.description||''));
          if(Number(product.qty)<=0&&!isUntrackedInventory(product)){addText(body,'span','stock-badge sold-out','Sold out');var disabled=document.createElement('button');disabled.type='button';disabled.className='btn';disabled.disabled=true;disabled.textContent='Sold out';body.appendChild(disabled);}
          else{if(Number(product.qty)>0&&Number(product.qty)<=3)addText(body,'span','stock-badge','Only '+product.qty+' left');var buy=document.createElement('a');buy.className='btn';buy.href=product.checkout_url;buy.target='_blank';buy.rel='noopener';buy.textContent='Buy';body.appendChild(buy);}
          grid.appendChild(card);
        });
        loadMoreBtn.hidden=matches.length<=renderedCount;
        status.hidden=matches.length>0;
        if(!matches.length)status.textContent=products.length?'No products match your filters.':'No products are available right now.';
      }
      function selectFilter(value){activeFilter=value;renderedCount=CHUNK_SIZE;tabs.querySelectorAll('button').forEach(function(tab){tab.setAttribute('aria-selected',String(tab.dataset.filter===value));});render();}
      function buildTabs(){
        GROUPS.forEach(function(value){var tab=document.createElement('button');tab.type='button';tab.className='filter-tab';tab.dataset.filter=value;tab.setAttribute('role','tab');tab.setAttribute('aria-selected',String(value==='All'));tab.textContent=value;tab.addEventListener('click',function(){selectFilter(value);});tabs.appendChild(tab);});
      }
      search.addEventListener('input',function(){renderedCount=CHUNK_SIZE;render();});
      sortSelect.addEventListener('change',function(){activeSort=sortSelect.value;renderedCount=CHUNK_SIZE;render();});
      loadMoreBtn.addEventListener('click',function(){renderedCount+=CHUNK_SIZE;render();});
      fetch('store-products.json',{cache:'no-cache'}).then(function(response){if(!response.ok)throw new Error('Product feed unavailable');return response.json();}).then(function(data){
        if(!Array.isArray(data))throw new Error('Invalid product feed');
        products=data;
        titleCounts={};products.forEach(function(product){titleCounts[product.title]=(titleCounts[product.title]||0)+1;});
        status.classList.remove('sr-only');buildTabs();render();addStructuredData(products);
      }).catch(function(){grid.replaceChildren();grid.setAttribute('aria-busy','false');status.classList.remove('sr-only');status.hidden=false;status.textContent='We could not load the shop right now. Please try again later.';});
    }());
  </script>
</body>
</html>
